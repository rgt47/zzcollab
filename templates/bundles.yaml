# ZZCOLLAB Profile Bundles
# Defines reusable bundles for system libraries and R packages
# These are the components of the predefined profiles (selected via
# 'zzcollab <profile>')

#=============================================================================
# SYSTEM LIBRARY BUNDLES
#=============================================================================
# These are sets of system dependencies installed via apt-get

library_bundles:
  none:
    description: "No additional system libraries"
    deps: []
    package_manager: "apt-get"
    compatible_bases: ["rocker/r-ver"]
    warning: "Most R packages will fail without system dependencies"

  minimal:
    description: "Essential development libraries"
    deps:
      - git
      - curl
      - wget
    package_manager: "apt-get"
    compatible_bases: ["rocker/*"]
    note: "Dev headers (libcurl4-openssl-dev, libssl-dev, libxml2-dev) in common section"

  terminals:
    description: "GUI terminals and fonts (lightweight GUI)"
    deps:
      - xfce4-terminal
      - terminator
      - xterm
      - fonts-jetbrains-mono
      - fonts-firacode
      - fonts-hack
      - fonts-dejavu
      - fonts-liberation
    package_manager: "apt-get"
    compatible_bases: ["rocker/*"]
    note: "Requires X11 forwarding (XQuartz on macOS). Includes Nerd Fonts."

#=============================================================================
# R PACKAGE BUNDLES
#=============================================================================
# These are sets of R packages installed via install.packages()

package_bundles:
  minimal:
    description: "Minimal essential packages for development"
    packages:
      - renv
      - devtools
      - usethis
      - tinytest
      - roxygen2
    requires_libs: ["minimal"]

  tidyverse:
    description: "Tidyverse ecosystem for data analysis"
    packages:
      - renv
      - devtools
      - tidyverse
      - here
    requires_libs: ["minimal"]

#=============================================================================
# COMPLETE PROFILES
#=============================================================================
# Predefined combinations of base-image + libs + pkgs
# Run 'zzc help profiles' for descriptions
#
# Four profiles. 'publishing' adds the rendering toolchain (rmarkdown,
# bookdown, LaTeX) via the rocker/verse base. For other specialised needs
# (modeling, shiny), start from one of these and add packages inside the
# container with install.packages(), then commit the updated renv.lock.

profiles:
  minimal:
    description: "Minimal development environment (command-line only)"
    base_image: "rocker/r-ver"
    libs: minimal
    pkgs: minimal
    size: "~650MB"

  # Renamed from 'analysis' to avoid colliding with the 'analysis' research
  # archetype; 'analysis' is still accepted as a deprecated alias (see
  # get_profile_base_image in modules/profiles.sh).
  tidyverse:
    description: "Data analysis with tidyverse"
    base_image: "rocker/tidyverse"
    libs: minimal
    pkgs: tidyverse
    size: "~1.2GB"

  rstudio:
    description: "RStudio Server development environment"
    base_image: "rocker/rstudio"
    libs: minimal
    pkgs: minimal
    size: "~980MB"

  publishing:
    description: "Manuscript rendering (rmarkdown, bookdown, LaTeX)"
    base_image: "rocker/verse"
    libs: minimal
    pkgs: minimal
    size: "~4.2GB"
