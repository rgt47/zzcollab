# zzcollab r-package.yml v$ZZCOLLAB_TEMPLATE_VERSION
#
# Self-adapting package check. Runs in a generic rocker container (not the
# project image) and detects the backend at run time: with renv.lock present it
# restores the pinned library (L1); without it, it installs dependencies from
# DESCRIPTION via pak (L0). The same workflow therefore survives toggling renv
# on or off with no edits.
name: R Package Check (Container)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  check:
    runs-on: ubuntu-latest
    container: rocker/tidyverse:4.6.0
    env:
      ZZCOLLAB_CONTAINER: "true"
      CI_TOOLS_LIB: "/tmp/ci-tools"
      RENV_CONFIG_REPOS_OVERRIDE: "https://packagemanager.posit.co/cran/__linux__/noble/latest"
      _R_CHECK_FORCE_SUGGESTS_: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y jq libcurl4-openssl-dev libssl-dev libxml2-dev cmake

      - name: Detect backend
        id: mode
        run: |
          if [ -f renv.lock ]; then
            echo "renv=true" >> "$GITHUB_OUTPUT"
            echo "Backend: renv (renv.lock present)"
          else
            echo "renv=false" >> "$GITHUB_OUTPUT"
            echo "Backend: DESCRIPTION (no renv.lock)"
          fi

      - name: Validate package files exist
        run: |
          test -f DESCRIPTION || { echo "Missing DESCRIPTION"; exit 1; }
          echo "Package files validated"

      # --- renv backend: restore the pinned library ---
      - name: Cache renv packages
        if: steps.mode.outputs.renv == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/R/renv
          key: renv-${{ hashFiles('renv.lock') }}
          restore-keys: |
            renv-

      - name: Install renv and restore project packages
        if: steps.mode.outputs.renv == 'true'
        run: |
          Rscript -e "install.packages('renv', repos = 'https://cloud.r-project.org')"
          Rscript -e "renv::restore(prompt = FALSE)"

      # --- DESCRIPTION backend: install declared dependencies via pak ---
      - name: Install dependencies from DESCRIPTION
        if: steps.mode.outputs.renv == 'false'
        run: |
          Rscript -e "install.packages('pak', repos = 'https://cloud.r-project.org')"
          Rscript -e "pak::local_install_deps(root = '.', dependencies = TRUE)"

      - name: Install CI tools to separate library
        run: |
          mkdir -p $CI_TOOLS_LIB
          Rscript -e "install.packages(c('rcmdcheck', 'tinytest'),
                                       lib = Sys.getenv('CI_TOOLS_LIB'),
                                       repos = 'https://cloud.r-project.org')"

      - name: Run R CMD check
        run: |
          Rscript --no-init-file -e "\
            rlib <- normalizePath(Sys.glob('renv/library/*/*')[1], mustWork = FALSE); \
            libs <- c(Sys.getenv('CI_TOOLS_LIB'), rlib, .libPaths()); \
            .libPaths(libs[!is.na(libs) & nchar(libs) > 0]); \
            rcmdcheck::rcmdcheck(args = '--no-manual', error_on = 'error')"

      - name: Run tests
        continue-on-error: true
        run: |
          Rscript -e "
            .libPaths(c(Sys.getenv('CI_TOOLS_LIB'), .libPaths()))
            if (dir.exists('inst/tinytest')) {
              out <- tinytest::run_test_dir('inst/tinytest')
              if (any(!as.logical(out))) quit(status = 1)
            } else {
              message('No inst/tinytest directory found, skipping tests')
            }
          "

      - name: Validate project structure
        run: |
          echo "✅ DESCRIPTION found"
          test -d R && echo "✅ R/ directory found" || echo "⚠️  No R/ directory"
          test -f renv.lock && echo "✅ renv.lock found (renv backend)" \
            || echo "ℹ️  no renv.lock (DESCRIPTION backend)"
          echo "✅ Project structure validated"
