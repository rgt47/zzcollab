name: Render Research Report

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main, master]
    paths:
      - 'analysis/report/**'
      - 'analysis/scripts/**'
      - 'R/**'
      - 'renv.lock'

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-latex-base \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-latex-extra

      - name: Restore R packages
        run: |
          Rscript -e "renv::restore()"

      - name: Detect main manuscript
        id: detect
        run: |
          # Try common manuscript locations and patterns. Accepts
          # .Rmd and .qmd, with .Rmd preferred when both are
          # present at the same canonical name (legacy precedence).
          MANUSCRIPT=""
          for candidate in \
            analysis/report/report.Rmd \
            analysis/report/report.qmd \
            analysis/report/manuscript.Rmd \
            analysis/report/manuscript.qmd \
            analysis/report/main.Rmd \
            analysis/report/main.qmd \
            analysis/report/index.qmd
          do
            if [ -f "$candidate" ]; then
              MANUSCRIPT="$candidate"
              break
            fi
          done

          if [ -z "$MANUSCRIPT" ]; then
            # Fallback: largest .Rmd or .qmd in analysis/report/
            MANUSCRIPT=$(find analysis/report \( -name "*.Rmd" -o -name "*.qmd" \) -type f -exec ls -lS {} + 2>/dev/null | head -1 | awk '{print $NF}')
          fi

          if [ -z "$MANUSCRIPT" ]; then
            echo "No manuscript found in analysis/report/"
            exit 1
          fi

          ENGINE="rmarkdown"
          case "$MANUSCRIPT" in
            *.qmd) ENGINE="quarto" ;;
          esac

          echo "manuscript=$MANUSCRIPT" >> $GITHUB_OUTPUT
          echo "engine=$ENGINE" >> $GITHUB_OUTPUT
          echo "Detected manuscript: $MANUSCRIPT (engine: $ENGINE)"

      - name: Render with rmarkdown
        if: steps.detect.outputs.engine == 'rmarkdown'
        run: |
          MANUSCRIPT="${{ steps.detect.outputs.manuscript }}"
          echo "Rendering $MANUSCRIPT via rmarkdown::render..."
          Rscript -e "rmarkdown::render('$MANUSCRIPT')"

      - name: Render with quarto
        if: steps.detect.outputs.engine == 'quarto'
        run: |
          MANUSCRIPT="${{ steps.detect.outputs.manuscript }}"
          echo "Rendering $MANUSCRIPT via quarto render..."
          quarto render "$MANUSCRIPT"

      - name: Render supplementary files (optional)
        continue-on-error: true
        run: |
          # Render other Rmd files in analysis/scripts if they exist
          find analysis/scripts -name "*.Rmd" -type f 2>/dev/null | while read rmd; do
            echo "Rendering supplementary: $rmd"
            Rscript -e "rmarkdown::render('$rmd')" || echo "Failed to render $rmd"
          done

      - name: Check rendering output
        run: |
          MANUSCRIPT="${{ steps.detect.outputs.manuscript }}"
          # Strip extension regardless of .Rmd or .qmd
          STEM="${MANUSCRIPT%.*}"
          # Accept either .pdf or .html as success
          PDF_FILE="${STEM}.pdf"
          HTML_FILE="${STEM}.html"
          if [ -f "$PDF_FILE" ]; then
            echo "Manuscript rendered to PDF"
            ls -lh "$PDF_FILE"
          elif [ -f "$HTML_FILE" ]; then
            echo "Manuscript rendered to HTML"
            ls -lh "$HTML_FILE"
          else
            echo "Render output not found at $PDF_FILE or $HTML_FILE"
            exit 1
          fi

      - name: Upload rendered documents
        uses: actions/upload-artifact@v4
        with:
          name: rendered-documents
          path: |
            analysis/report/*.pdf
            analysis/report/*.html
            analysis/scripts/*.pdf
            analysis/figures/*.pdf
            analysis/figures/*.png
          retention-days: 30
          if-no-files-found: warn

      - name: Generate summary
        if: success()
        run: |
          MANUSCRIPT="${{ steps.detect.outputs.manuscript }}"
          PDF_FILE="${MANUSCRIPT%.Rmd}.pdf"

          echo "## ✅ Documents Rendered Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Main Manuscript" >> $GITHUB_STEP_SUMMARY
          echo "- **File**: \`$(basename $MANUSCRIPT)\`" >> $GITHUB_STEP_SUMMARY
          if [ -f "$PDF_FILE" ]; then
            echo "- **Size**: $(ls -lh $PDF_FILE | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Download**: Check 'Artifacts' section above" >> $GITHUB_STEP_SUMMARY
