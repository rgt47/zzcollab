# zzcollab render-report.yml v$ZZCOLLAB_TEMPLATE_VERSION
#
# Tier 3 (render) for all zzcollab research compendia. Self-adapting: the
# environment backend is detected at run time from artifact presence, so the
# same workflow survives toggling Docker on or off without edits.
#
#   Dockerfile present  -> build the project image and render inside the
#                          container (environment pinned, capture level L2).
#   Dockerfile absent   -> render on the host runner. Packages are restored
#                          from renv.lock when present (L1), otherwise
#                          installed from DESCRIPTION via pak (L0).
#
# HTML output validates R code execution and package reproducibility without
# requiring a LaTeX installation in CI. PDF rendering is performed on the host
# with the local xelatex toolchain. Path-filtered to run only when analysis
# code or the environment definition changes.
#
name: Render Reports

on:
  push:
    branches: [ main, master ]
    paths:
      - 'analysis/**'
      - 'R/**'
      - 'DESCRIPTION'
      - 'renv.lock'
      - 'Dockerfile'
      - '.github/workflows/render-report.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'analysis/**'
      - 'R/**'
      - 'DESCRIPTION'
      - 'renv.lock'
      - 'Dockerfile'

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Detect environment backend
        id: mode
        run: |
          if [ -f Dockerfile ]; then
            echo "docker=true" >> "$GITHUB_OUTPUT"
            echo "Environment: Docker (Dockerfile present)"
          else
            echo "docker=false" >> "$GITHUB_OUTPUT"
            echo "Environment: host runner (no Dockerfile)"
          fi

      # --- Containerised render: environment pinned by the project image ---
      - name: Set up Buildx
        if: steps.mode.outputs.docker == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: steps.mode.outputs.docker == 'true'
        run: |
          echo "Building computational environment..."
          docker build -t compendium-env .

      - name: Render all manuscripts (container)
        if: steps.mode.outputs.docker == 'true'
        run: |
          docker run --rm -e CI=true \
            -v ${{ github.workspace }}:/project \
            -w /project compendium-env \
            Rscript --vanilla -e '
              baked_lib <- Sys.glob("/opt/renv/library/*/*")[1]
              if (!is.na(baked_lib) && nzchar(baked_lib)) {
                .libPaths(c(baked_lib, .libPaths()))
              }
              rmds <- list.files(
                "analysis", pattern = "^report[.]Rmd$",
                recursive = TRUE, full.names = TRUE
              )
              cat("Found", length(rmds), "manuscripts to render\n\n")
              failed <- character()
              for (rmd in rmds) {
                cat("=== Rendering:", rmd, "===\n")
                old_wd <- setwd(dirname(rmd))
                tryCatch(
                  rmarkdown::render(basename(rmd), output_format = "html_document"),
                  error = function(e) {
                    cat("FAILED:", conditionMessage(e), "\n")
                    failed <<- c(failed, rmd)
                  }
                )
                setwd(old_wd)
              }
              cat("\n=== summary ===\n")
              cat("rendered:", length(rmds) - length(failed), "\n")
              cat("failed:  ", length(failed), "\n")
              if (length(failed) > 0) {
                for (f in failed) cat("  ", f, "\n")
                quit(status = 1)
              }
            '

      # --- Host render: no Dockerfile; renv pins packages when present ---
      - name: Set up pandoc
        if: steps.mode.outputs.docker == 'false'
        uses: r-lib/actions/setup-pandoc@v2

      - name: Set up R
        if: steps.mode.outputs.docker == 'false'
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Restore or install packages (host)
        if: steps.mode.outputs.docker == 'false'
        run: |
          if [ -f renv.lock ]; then
            echo "Restoring packages from renv.lock..."
            Rscript -e "install.packages('renv', repos = 'https://cloud.r-project.org')"
            Rscript -e "renv::restore(prompt = FALSE)"
          else
            echo "No renv.lock; installing dependencies from DESCRIPTION via pak..."
            Rscript -e "install.packages('pak', repos = 'https://cloud.r-project.org')"
            Rscript -e "pak::local_install_deps(root = '.', dependencies = TRUE)"
          fi
          Rscript -e "if (!requireNamespace('rmarkdown', quietly = TRUE)) install.packages('rmarkdown', repos = 'https://cloud.r-project.org')"

      - name: Render all manuscripts (host)
        if: steps.mode.outputs.docker == 'false'
        run: |
          Rscript -e '
            rmds <- list.files(
              "analysis", pattern = "^report[.]Rmd$",
              recursive = TRUE, full.names = TRUE
            )
            cat("Found", length(rmds), "manuscripts to render\n\n")
            failed <- character()
            for (rmd in rmds) {
              cat("=== Rendering:", rmd, "===\n")
              old_wd <- setwd(dirname(rmd))
              tryCatch(
                rmarkdown::render(basename(rmd), output_format = "html_document"),
                error = function(e) {
                  cat("FAILED:", conditionMessage(e), "\n")
                  failed <<- c(failed, rmd)
                }
              )
              setwd(old_wd)
            }
            cat("\n=== summary ===\n")
            cat("rendered:", length(rmds) - length(failed), "\n")
            cat("failed:  ", length(failed), "\n")
            if (length(failed) > 0) {
              for (f in failed) cat("  ", f, "\n")
              quit(status = 1)
            }
          '

      - name: Upload rendered HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rendered-html
          path: |
            analysis/**/*.html
          retention-days: 30
          if-no-files-found: warn
