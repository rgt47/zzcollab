on:
  push:
    branches: [main, master]
  pull_request:

name: test-coverage

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2
          needs: coverage

      - name: Test coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv('RUNNER_TEMP'), winslash = '/'), 'package')
          )
          covr::to_cobertura(cov)
        shell: Rscript {0}

      - uses: codecov/codecov-action@v7
        with:
          # Do not fail the job on a Codecov upload error. On a protected
          # branch (main) Codecov rejects tokenless uploads ("Token required"),
          # which previously failed the whole job even though coverage computed
          # fine. Coverage is informational, not a correctness gate; if a
          # CODECOV_TOKEN secret is configured the upload still succeeds.
          fail_ci_if_error: false
          file: ./cobertura.xml
          plugin: noop
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Show testthat output
        if: always()
        run: |
          find '${{ runner.temp }}/package' -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash
