name: Shell Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell-tests:
    name: Shell Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Run shell test suite
      run: |
        # run_all_tests.sh auto-discovers and runs every tests/shell/test-*.sh.
        # Capture the output once (pipefail makes the step fail if the suite
        # fails) so the report artifact does not re-run the whole suite.
        mkdir -p test-reports
        {
          echo "# Shell Tests Report"
          echo "Generated on: $(date)"
          echo ""
        } > test-reports/shell-tests-report.md
        bash tests/shell/run_all_tests.sh 2>&1 \
          | tee -a test-reports/shell-tests-report.md

    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: shell-tests-report
        path: test-reports/shell-tests-report.md
        retention-days: 30
