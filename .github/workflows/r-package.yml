name: ZZCOLLAB Framework R Package Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  check:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # Focus on stable R versions across key platforms
        include:
          # Primary: Ubuntu with latest R (most reliable)
          - os: ubuntu-latest
            r-version: '4.4'
          # Ubuntu with older R for compatibility
          - os: ubuntu-latest
            r-version: '4.3'
          # macOS for cross-platform validation
          - os: macos-latest
            r-version: '4.4'
          # Windows for cross-platform validation
          - os: windows-latest
            r-version: '4.4'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: r-lib/actions/setup-pandoc@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2

      - uses: r-lib/actions/setup-r@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2
        with:
          r-version: ${{ matrix.r-version }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          extra-packages: any::rcmdcheck, any::covr
          needs: check

      - uses: r-lib/actions/check-r-package@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2
        with:
          upload-snapshots: true

      - name: Test coverage
        if: matrix.os == 'ubuntu-latest' && matrix.r-version == '4.4'
        run: |
          covr::codecov(quiet = FALSE)
        shell: Rscript {0}

      - name: Calculate and enforce coverage threshold
        if: matrix.os == 'ubuntu-latest' && matrix.r-version == '4.4'
        run: |
          cov <- covr::package_coverage()
          pct <- covr::percent_coverage(cov)

          cat("Test Coverage:", sprintf("%.1f%%", pct), "\n")

          # Threshold set to current coverage level (35%)
          # TODO: Increase threshold as more tests are added
          if (pct < 35) {
            cat("::error::Coverage", sprintf("%.1f%%", pct), "is below minimum 35%\n")
            quit(status = 1)
          } else {
            cat("::notice::Coverage", sprintf("%.1f%%", pct), "meets minimum threshold\n")
          }
        shell: Rscript {0}
