name: ShellCheck

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  shellcheck:
    name: ShellCheck Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Install ShellCheck
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck

    - name: Verify ShellCheck installation
      run: shellcheck --version

    - name: Run ShellCheck on main script
      run: |
        echo "Checking main zzcollab.sh script..."
        shellcheck --severity=warning zzcollab.sh

    - name: Run ShellCheck on modules
      run: |
        echo "Checking all modules..."
        find modules -name "*.sh" -type f | while read -r file; do
          echo "Checking $file..."
          shellcheck --severity=warning "$file"
        done

    - name: Run ShellCheck on utility scripts
      run: |
        echo "Checking utility scripts..."
        for script in install.sh; do
          if [ -f "$script" ]; then
            echo "Checking $script..."
            shellcheck --severity=warning "$script"
          fi
        done

    - name: Run ShellCheck on developer scripts
      run: |
        echo "Checking developer scripts..."
        find scripts -name "*.sh" -type f | while read -r file; do
          echo "Checking $file..."
          shellcheck --severity=warning "$file"
        done

    - name: Run ShellCheck on shell tests
      run: |
        echo "Checking shell tests..."
        find tests/shell -name "*.sh" -type f | while read -r file; do
          echo "Checking $file..."
          shellcheck --severity=warning "$file"
        done

    - name: Run ShellCheck on template scripts
      run: |
        echo "Checking template scripts..."
        find templates -name "*.sh" -type f | while read -r file; do
          echo "Checking $file..."
          shellcheck --severity=warning "$file"
        done

    - name: Check for :latest base-image defaults (CRITICAL for reproducibility)
      run: |
        echo "Checking base-image pins in the Dockerfile generator and templates..."

        # The project Dockerfile is generated by modules/docker.sh (heredoc);
        # templates/Makefile reads the resulting base image. These must pin the
        # base image. A missing file is itself an error, so this check cannot
        # silently become vacuous if a file is renamed or removed.
        CRITICAL_FILES=(
          "modules/docker.sh"
          "templates/Makefile"
        )

        VIOLATIONS=0
        for file in "${CRITICAL_FILES[@]}"; do
          if [ ! -f "$file" ]; then
            echo "ERROR: expected file not found: $file"
            VIOLATIONS=$((VIOLATIONS + 1))
            continue
          fi
          echo "Checking $file..."
          # Flag only reproducibility-breaking base-image defaults: a
          # FROM ...:latest, or an ARG/ENV R_VERSION/BASE_IMAGE of latest.
          # Local output tags such as "$project:latest" are fine and not matched.
          if grep -nE 'FROM[^#]*:latest|(ARG|ENV)[[:space:]]+(R_VERSION|BASE_IMAGE)[^#]*latest' "$file"; then
            echo "ERROR: Found :latest base-image default in $file"
            VIOLATIONS=$((VIOLATIONS + 1))
          else
            echo "OK: $file base image is pinned"
          fi
        done

        if [ "$VIOLATIONS" -gt 0 ]; then
          echo ""
          echo "FAILED: $VIOLATIONS reproducibility issue(s)"
          echo "Docker base images must be version-pinned."
          exit 1
        fi

        echo "All critical files OK - base images are pinned"

    - name: Generate ShellCheck report
      run: |
        echo "Generating comprehensive ShellCheck report..."
        {
          echo "# ShellCheck Analysis Report"
          echo "Generated on: $(date)"
          echo ""
          echo "## Summary"
          echo "- Main script: zzcollab.sh"
          echo "- Modules: $(find modules -name "*.sh" -type f | wc -l) files"
          echo "- Utility scripts: $(find . -maxdepth 1 -name "*.sh" -type f | wc -l) files"
          echo "- Template scripts: $(find templates -name "*.sh" -type f | wc -l) files"
          echo ""
          echo "## Analysis Results"
          echo "All scripts passed ShellCheck analysis with no issues."
        } > shellcheck-report.md

    - name: Upload ShellCheck report
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: shellcheck-report
        path: shellcheck-report.md
        retention-days: 30

    - name: Comment on PR (if pull request)
      if: github.event_name == 'pull_request'
      uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('shellcheck-report.md', 'utf8');
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '## ShellCheck Analysis Results\n\n' + report
          });

  shellcheck-diff:
    name: ShellCheck Diff Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Install ShellCheck
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck

    - name: Get changed shell files
      id: changed-files
      run: |
        git diff --name-only origin/main...HEAD | grep -E '\.(sh|bash)$' | tee changed-files.txt || true
        echo "changed_files=$(tr '\n' ' ' < changed-files.txt)" >> "$GITHUB_OUTPUT"

    - name: Run ShellCheck on changed files
      if: steps.changed-files.outputs.changed_files != ''
      run: |
        echo "Running ShellCheck on changed files..."
        while read -r file; do
          if [ -f "$file" ]; then
            echo "Checking $file..."
            shellcheck --severity=warning "$file"
          fi
        done < changed-files.txt

    - name: No shell files changed
      if: steps.changed-files.outputs.changed_files == ''
      run: |
        echo "No shell files were changed in this PR."
